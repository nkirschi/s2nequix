seml:
  executable: seml_run.py
  output_dir: ./output_log/slurm/s2nequix
  project_root_dir: ./

slurm:
  - experiments_per_job: 1
    # max_simultaneous_jobs: 4
    sbatch_options:
      gres: gpu:1 # num GPUs
      mem: 32G # memory
      cpus-per-task: 8 # num cores
      time: 5-00:00 # max time, D-HH:MM
      partition: gpu_a100
      qos: default # default # interactive

fixed:
  profile_device_memory: false
  jax_enable_x64: false
  run_notes: "verify run 368 can be emulated after the recent changes"
  config_path: "configs/omol25.yml"  # path to base config file
  config_override:  # override entries from the base config file
    subset: "spice"


grid:  # remember to increase slurm time limit
  config_override:
    seed:
      type: choice
      options:
        - 1
        #- 2
        #- 3
    model:
      type: choice
      options:
        - "s2nequix-cheby"

    cheby_degree:
      type: choice
      options:
        #- 5
        - 10
        #- 20

    pretransform_feats:
      type: choice
      options:
        - true
        #- false
    
    weight_decay_cheby:
      type: choice
      options:
        #- 1.0e-2
        - 1.0e-3

    spectral_cutoffs:
      type: choice
      options:
        #- [6.0, 8.0, 10.0, 12.0]
        - [6.0]