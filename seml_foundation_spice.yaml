seml:
  executable: seml_run.py
  output_dir: ./output_log/slurm/s2nequix
  project_root_dir: ./

slurm:
  - experiments_per_job: 1
    # max_simultaneous_jobs: 4
    sbatch_options:
      gres: gpu:1 # num GPUs
      mem: 32G # memory
      cpus-per-task: 8 # num cores
      time: 30-00:00 # max time, D-HH:MM
      partition: gpu_h200
      qos: default # default # interactive
      exclude: gpu23

fixed:
  profile_device_memory: false
  jax_enable_x64: false
  run_notes: "spice foundation model"
  config_path: "configs/omol25.yml"  # path to base config file
  config_override:  # override entries from the base config file
    subset: "spice"


grid:
  config_override:
    seed:
      type: choice
      options:
        - 1
    model:
      type: choice
      options:
        - "nequix"
        - "s2nequix-cheby"
